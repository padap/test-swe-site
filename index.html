<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWE-MERA — Dynamic Alternative to SWE-bench</title>
  <link rel="icon" href="./assets/headerLogo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #1e293b;
      min-height: 100vh;
    }
    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, rgb(102, 126, 234) 0%, rgb(118, 75, 162) 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      border-radius: 0 0 20px 20px;
    }
    .header-logo-link {
      position: relative;
      z-index: 101;
      transition: transform 0.3s;
    }
    .header-logo-link:hover { transform: scale(1.1); }
    .header-logo-link img { 
      height: 50px;
      filter: brightness(0) invert(1);
    }
    .header-nav { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
    }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      color: #fff; 
      font-size: 14px; 
      font-weight: 600;
      transition: transform 0.3s, background 0.3s, border-color 0.3s;
      cursor: pointer; 
      background: rgba(255, 255, 255, 0.1);
    }
    .nav-btn:hover { 
      transform: scale(1.05); 
      background: rgba(255, 255, 255, 0.2); 
      border-color: rgba(255, 255, 255, 0.5); 
    }
    .nav-btn.active-nav {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* ===== HAMBURGER MENU ===== */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      z-index: 102;
    }
    .hamburger span {
      width: 24px;
      height: 3px;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }
    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }
    .mobile-menu {
      display: none;
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      background: rgba(102, 126, 234, 0.98);
      backdrop-filter: blur(16px);
      padding: 20px;
      z-index: 99;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    .mobile-menu.active {
      transform: translateY(0);
    }
    .mobile-menu .nav-btn {
      width: 100%;
      justify-content: flex-start;
    }
    .mobile-menu .lang-toggle {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }

    /* ===== LANGUAGE TOGGLE ===== */
    .lang-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .lang-toggle button {
      padding: 6px 14px; 
      border: none; 
      background: transparent;
      color: rgba(255, 255, 255, 0.7); 
      font-family: 'Roboto', sans-serif;
      font-size: 12px; 
      font-weight: 600; 
      cursor: pointer;
      text-transform: uppercase; 
      transition: background 0.3s, color 0.3s;
    }
    .lang-toggle button.active {
      background: rgba(255, 255, 255, 0.4); 
      border-radius: 20px;
      color: #fff;
    }

    /* ===== INTRO ===== */
    .intro {
      margin-top: 100px;
      display: flex; 
      flex-direction: column; 
      align-items: center;
      gap: 20px; 
      text-align: center;
      max-width: 960px; 
      padding: 0 16px;
    }
    .intro-logo { 
      width: 596px; 
      height: 156px; 
    }
    .intro h1 {
      font-size: clamp(1.75rem, 1.2266rem + 1.9704vw, 3rem);
      font-weight: 800;
      color: #1e293b;
      text-shadow: none;
      margin-bottom: 20px;
    }
    .intro-links {
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap;
      justify-content: center; 
      margin-bottom: 10px;
    }
    .intro-link-btn {
      display: flex; 
      align-items: center; 
      gap: 6px;
      padding: 8px 16px; 
      border-radius: 10px;
      border: 2px solid #8b5cf6;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff; 
      font-size: 14px;
      font-weight: 600; 
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
    }
    .intro-link-btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5); 
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
    }
    .intro-link-btn img { 
      width: 20px; 
      height: 20px; 
      filter: brightness(0) invert(1);
    }

    /* ===== MAIN ===== */
    .main {
      display: flex; 
      flex-direction: column; 
      align-items: center;
      margin-top: 40px; 
      margin-bottom: 60px;
      padding: 0 16px; 
      width: 100%; 
      max-width: 1200px;
    }

    /* ===== DESCRIPTION ===== */
    .description { 
      max-width: 980px; 
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .description h2 {
      font-size: clamp(1.25rem, 2vw, 2.2rem);
      font-weight: 700; 
      margin-bottom: 24px; 
      color: #1e293b;
    }
    .description p {
      font-size: clamp(0.9rem, 1.2vw, 1.15rem);
      line-height: 1.7; 
      color: #475569;
      margin-bottom: 16px;
    }
    .description h2 {
      font-size: clamp(1.1rem, 1.8vw, 1.6rem);
      font-weight: 700;
      margin-top: 32px;
      margin-bottom: 16px;
      color: #1e293b;
    }
    .description ul, .description ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }
    .description li {

      color: #475569;
      margin-bottom: 8px;
    }

    }
    .description a:hover {

    }
    .description img {

      height: auto;
      margin: 20px 0;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard-page {
      margin-top: 20px;
      width: 100%; 
      max-width: 980px;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      min-height: 800px;
    }
    .leaderboard-title {
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      margin-top: 16px;
      margin-bottom: 24px;
    }

    /* ===== DUAL RANGE SLIDER ===== */
    .slider-section { 
      margin-bottom: 24px; 
    }
    .slider-section > label {
      font-size: 14px; 
      font-weight: 600; 
      color: #64748b;
      display: block; 
      margin-bottom: 12px;
    }
    .slider-info {
      font-size: 13px; 
      font-weight: 600; 
      color: #8b5cf6;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .slider-dates {
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 8px;
    }
    .slider-date-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; 
      font-weight: 600;
      color: #8b5cf6; 
      background: rgba(139, 92, 246, 0.1);
      padding: 4px 12px; 
      border-radius: 6px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .dual-range {
      position: relative; 
      height: 36px; 
      width: 100%;
    }
    .dual-range input[type="range"] {
      -webkit-appearance: none; 
      appearance: none;
      position: absolute; 
      top: 0; 
      left: 0;
      width: 100%; 
      height: 36px;
      background: transparent; 
      pointer-events: none;
      z-index: 3;
    }
    .dual-range input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; 
      height: 20px;
      border-radius: 50%;
      background: #8b5cf6;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
      cursor: pointer;
      pointer-events: auto;
      position: relative; 
      z-index: 3;
    }
    .dual-range input[type="range"]::-moz-range-thumb {
      width: 20px; 
      height: 20px;
      border-radius: 50%;
      background: #8b5cf6;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
      cursor: pointer;
      pointer-events: auto;
    }
    .dual-range input[type="range"]::-webkit-slider-runnable-track {
      height: 6px; 
      border-radius: 3px; 
      background: transparent;
    }
    .dual-range input[type="range"]::-moz-range-track {
      height: 6px; 
      border-radius: 3px; 
      background: transparent;
    }
    .dual-range .track {
      position: absolute;
      top: 15px; 
      left: 0; 
      right: 0;
      height: 6px; 
      border-radius: 3px;
      background: #e2e8f0;
    }
    .dual-range .track-active {
      position: absolute;
      top: 15px; 
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #8b5cf6, #a78bfa);
    }

    /* ===== TABLE ===== */

      width: 100%; 
      overflow-x: auto;
      position: relative;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
    }
    thead th {
      position: sticky; 
      top: 0; 
      background: #f8fafc;
      padding: 12px 14px; 
      text-align: left;
      font-size: 13px; 
      font-weight: 700; 
      color: #64748b;
      white-space: nowrap; 
      border-bottom: 2px solid #e2e8f0;

      user-select: none; 
      transition: background 0.2s;

    thead th:hover { background: #f1f5f9; }
    thead th:first-child { cursor: default; }
    thead th:first-child:hover { background: #f8fafc; }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
    thead th .sort-icon.active { opacity: 1; color: #8b5cf6; }
    tbody td {
      padding: 10px 14px; 
      font-size: 13px;
      font-family: 'Roboto', sans-serif;
      font-weight: 500; 
      color: #475569;
    }

      border-bottom: 1px solid #f1f5f9; 
      transition: background 0.15s; 
    }
    tbody tr:hover { background: #f8fafc; }
    td.model-name {
      font-family: 'Roboto', sans-serif;
      font-weight: 600; 
      color: #1e293b; 
      white-space: nowrap;
    }

    /* ===== RANK BADGES ===== */
    .rank-badge {
      display: inline-flex; 
      align-items: center; 
      justify-content: center;
      width: 32px; 
      height: 32px; 
      border-radius: 50%;
      font-weight: 700; 
      font-size: 13px; 
      font-family: 'Roboto', sans-serif;
    }
    .rank-1 { 
      background: linear-gradient(135deg, #fbbf24, #f59e0b); 
      color: #92400e; 
      box-shadow: 0 2px 10px rgba(251,191,36,0.35); 
    }
    .rank-2 { 
      background: linear-gradient(135deg, #d1d5db, #9ca3af); 
      color: #374151; 
      box-shadow: 0 2px 10px rgba(148,163,184,0.3); 
    }
    .rank-3 { 
      background: linear-gradient(135deg, #f97316, #ea580c); 
      color: #9a3412; 
      box-shadow: 0 2px 10px rgba(249,115,22,0.35); 
    }
    .rank-other { 
      background: #f1f5f9; 
      color: #475569; 
      border: 1px solid #cbd5e1; 
    }

    .no-data {
      text-align: center; 
      padding: 80px 20px;
      color: #64748b; 
      font-size: 16px; 
      font-weight: 500;
    }
    .hidden { display: none !important; }

    /* Tooltip for model hover */
    .model-tooltip {
      position: fixed;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid #8b5cf6;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #cbd5e1;
      white-space: nowrap;
      z-index: 10001;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    td.model-name:hover .model-tooltip {
      opacity: 1;
    }

    /* Footnote */
    .table-footnote {
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
      font-style: italic;
    }

    /* Checkboxes section */
    .filter-checkboxes {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-item label {
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      user-select: none;

    @media (max-width: 768px) {

      .header-nav { display: none !important; }

    @media (max-width: 500px) {

      .nav-btn {

      }
      .slider-section {

      }
      table { 
        min-width: 600px; 
      }
    }
  </style>
</head>

<script>
// ============================================================
// I18N — content loaded from markdown files in content/ folder
// ============================================================
let TEXT = {};
const LANG_FOLDER = { eng: '', ru: 'ru' };

// ============================================================
// MARKDOWN PARSING HELPERS
// ============================================================
function parseFrontMatter(text) {
  const result = { meta: {}, body: '' };
  const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!match) { result.body = text; return result; }
  match[1].split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx === -1) return;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx + 1).trim();
    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'")))
      val = val.slice(1, -1);
    result.meta[key] = val;
  });
  result.body = match[2].trim();
  return result;
}

function parseMainBody(body) {
  const lines = body.split('\n');
  let title = '';
  let htmlParts = [];
  let currentP = '';
  let inList = false;
  let listItems = [];
  let inOrderedList = false;
  
  const flushParagraph = () => {
    if (currentP) {
      htmlParts.push('<p>' + formatInline(currentP) + '</p>');
      currentP = '';
    }
  };
  
  const flushList = () => {
    if (listItems.length > 0) {
      const tag = inOrderedList ? 'ol' : 'ul';
      htmlParts.push(`<${tag}>` + listItems.map(item => `<li>${formatInline(item)}</li>`).join('') + `</${tag}>`);
      listItems = [];
      inList = false;
      inOrderedList = false;
    }
  };
  
  const formatInline = (text) => {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.*?)\*/g, '<i>$1</i>')
      .replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2">$1</a>');
  };
  
  for (const line of lines) {
    const trimmed = line.trim();
    
    // Пропускаем пустые строки
    if (trimmed === '') {
      flushParagraph();
      flushList();
      continue;
    }
    
    // Заголовок H1
    if (trimmed.startsWith('# ')) {
      flushParagraph();
      flushList();
      title = trimmed.slice(2).trim();
      continue;
    }
    
    // Заголовок H2
    if (trimmed.startsWith('## ')) {
      flushParagraph();
      flushList();
      htmlParts.push('<h2>' + formatInline(trimmed.slice(3).trim()) + '</h2>');
      continue;
    }
    
    // Картинка
    if (trimmed.startsWith('![')) {
      flushParagraph();
      flushList();
      const match = trimmed.match(/!\[([^\]]*)\]\(([^\)]+)\)/);
      if (match) {
        htmlParts.push(`<img src="${match[2]}" alt="${match[1]}" style="max-width: 100%; height: auto; margin: 20px 0; border-radius: 8px;" />`);
      }
      continue;
    }
    
    // Ненумерованный список
    if (trimmed.startsWith('- ')) {
      flushParagraph();
      if (!inList || inOrderedList) {
        flushList();
        inList = true;
        inOrderedList = false;
      }
      listItems.push(trimmed.slice(2).trim());
      continue;
    }
    
    // Нумерованный список
    if (/^\d+\.\s/.test(trimmed)) {
      flushParagraph();
      if (!inList || !inOrderedList) {
        flushList();
        inList = true;
        inOrderedList = true;
      }
      listItems.push(trimmed.replace(/^\d+\.\s/, '').trim());
      continue;
    }
    
    // Обычный текст - добавляем к текущему параграфу
    flushList();
    if (currentP) currentP += ' ';
    currentP += trimmed;
  }
  
  // Не забываем flush в конце
  flushParagraph();
  flushList();
  
  const content = htmlParts.join('');
  return { title, content };
}

function contentPath(file) {
  const folder = LANG_FOLDER[lang];
  return folder ? `content/${folder}/${file}` : `content/${file}`;
}

async function fetchText(path) {
  try { 
    const r = await fetch(path); 
    return r.ok ? await r.text() : null; 
  } catch { 
    return null; 
  }
}

async function loadContent() {
  try {
    const [mainRes, lbRes] = await Promise.all([
      fetchText(contentPath('main.md')),
      fetchText(contentPath('leaderboard.md')),
    ]);

    // Fallback to English if a file wasn't found
    const mainText = mainRes ?? await fetchText('content/main.md');
    const lbText   = lbRes   ?? await fetchText('content/leaderboard.md');

    const main = parseFrontMatter(mainText || '');
    const lb   = parseFrontMatter(lbText || '');

    const mainBody = parseMainBody(main.body);

    TEXT = {
      header:             main.meta.header          || 'SWE-MERA',
      home:               main.meta.navHome          || 'Main',
      leaderboard:        main.meta.navLeaderboard   || 'Leaderboard',
      headerBlockFirst:   mainBody.title              || 'Description',
      textBlockFirst:     mainBody.content            || '',
      dateRange:          lb.meta.dateRange           || 'Date range',
      notExistedData:     lb.meta.notExistedData      || 'No data for this period',
      sliderInfo:         lb.meta.sliderInfo          || 'There are {n} tasks in time window: {from} to {to}',
      footnoteSubset:     lb.meta.footnoteSubset      || '* Model was evaluated on a subset of tasks.',
      model:              lb.meta.model               || 'Model',
      position:           lb.meta.position            || 'Position',
      tasks:              lb.meta.tasks               || 'Tasks',
      trajectory:         lb.meta.trajectory          || 'Trajectory',
    };

    updateAllTexts();
    
    // Re-render leaderboard if visible
    if (!document.getElementById("page-leaderboard").classList.contains("hidden")) {
      updateSliderInfo();
      renderTable();
    }
  } catch (e) {
    console.error('Failed to load content:', e);
  }
}

// ============================================================
// STATE
// ============================================================
let lang = "eng";
let allData = [];
let modelMetadata = {};
let startDate = 0, endDate = 0, dateMin = 0, dateMax = 0;
let currentSortKey = null, sortDirection = null;
let originalData = [];

// ============================================================
// I18N HELPERS
// ============================================================
function t(key) { 
  return TEXT[key] || key; 
}

function setLang(newLang) {
  lang = newLang;
  document.querySelectorAll(".lang-toggle button").forEach(btn => btn.classList.remove("active"));
  document.getElementById(newLang === 'eng' ? 'btnEng' : 'btnRu')?.classList.add("active");
  loadContent(); // Re-load content for new language
}

function updateAllTexts() {
  document.querySelectorAll("[data-text]").forEach(el => {
    const key = el.getAttribute("data-text");
    const val = t(key);
    if (val && val.includes("<")) el.innerHTML = val; 
    else el.textContent = val;
  });
}

// ============================================================
// ROUTING
// ============================================================
function route() {
  const hash = window.location.hash || "#/";
  const pages = ["page-description", "page-leaderboard"];
  pages.forEach(id => document.getElementById(id).classList.add("hidden"));

  const introSection = document.getElementById("intro-section");

  // Reset active nav
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active-nav"));

  if (hash === "#/leaderboard") {
    document.getElementById("page-leaderboard").classList.remove("hidden");
    introSection.classList.add("hidden");
    document.getElementById("navLeaderboard").classList.add("active-nav");
    if (allData.length > 0) {
      updateSliderInfo();
      renderTable();
    }
  } else {
    document.getElementById("page-description").classList.remove("hidden");
    introSection.classList.remove("hidden");
    document.getElementById("navMain").classList.add("active-nav");
  }
}
window.addEventListener("hashchange", route);

// ============================================================
// DATA LOADING — JSONL format: data/{model}/results.jsonl
// ============================================================
function parseJsonl(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(l => JSON.parse(l));
}

function summarize(data) {
  const grouped = data.reduce((acc, row) => {
    (acc[row.model] ||= []).push(row);
    return acc;
  }, {});

  const mean = (arr) => arr.reduce((a, b) => a + b, 0) / arr.length;
  const std = (arr) => {
    const m = mean(arr);
    return Math.sqrt(arr.reduce((s, x) => s + (x - m) ** 2, 0) / arr.length);
  };

  const summary = Object.entries(grouped).map(([model, rows]) => {
    const pass1 = rows.map((r) => r["pass@1"]);
    const pass6 = rows.map((r) => r["pass@6"]);
    const tasksLength = rows.length;
    return {
      modelIdx: 0,
      model,
      "pass@1": mean(pass1) * 100,
      "pass1_std": std(pass1) / Math.sqrt(tasksLength) * 100,
      "pass@6": mean(pass6) * 100,
      n_task: tasksLength,
      trajectory: `https://github.com/MERA-Evaluation/SWE-MERA-submissions/tree/main/submissions/${model}`,
    };
  });

  summary.sort((a, b) => b["pass@1"] - a["pass@1"]);
  summary.forEach((row, idx) => {
    row.modelIdx = idx + 1;
  });

  return summary;
}

function filterByDate(data, start, end) {
  return data.filter((row) => {
    const date = new Date(row.date).getTime();
    return date >= start.getTime() && date <= end.getTime();
  });
}

async function loadAllData() {
  try {
    // 1. Загружаем метаданные моделей и index.json
    const [metadataRes, indexRes] = await Promise.all([
      fetch('./data/model_metadata.json').then(r => r.ok ? r.json() : {}),
      fetch('./data/index.json')
    ]);
    
    modelMetadata = metadataRes;
    const index = await indexRes.json();

    // 2. Для каждой модели загружаем results.jsonl
    const fetchPromises = [];
    const fetchMeta = [];

    for (const modelEntry of index.models) {
      for (const [key, filename] of Object.entries(modelEntry.files)) {
        const url = `./data/${encodeURIComponent(modelEntry.name)}/${filename}`;
        fetchPromises.push(fetch(url).then(r => r.ok ? r.text() : ''));
        fetchMeta.push({ model: modelEntry.name });
      }
    }

    const results = await Promise.all(fetchPromises);

    // 3. Парсим JSONL и собираем данные
    allData = [];
    results.forEach((text, i) => {
      if (!text) return;
      const { model } = fetchMeta[i];
      const records = parseJsonl(text);
      
      for (const rec of records) {
        allData.push({
          model,
          date: rec.date,
          task_id: rec.task_id,
          "pass@1": rec["pass@1"],
          "pass@6": rec["pass@6"]
        });
      }
    });

    console.log(`Loaded ${allData.length} rows from ${index.models.length} models`);

    if (allData.length > 0) {
      const dates = allData.map(r => new Date(r.date).getTime());
      dateMin = Math.min(...dates);
      dateMax = Math.max(...dates);
      startDate = dateMin;
      endDate = dateMax;

      // Initialize slider
      initSlider();
      updateTable();
    }
  } catch (error) {
    console.error('Failed to load data:', error);
  }
}

// ============================================================
// DUAL RANGE SLIDER
// ============================================================
function initSlider() {
  const sliderStart = document.getElementById('sliderStart');
  const sliderEnd = document.getElementById('sliderEnd');
  const trackActive = document.getElementById('trackActive');

  sliderStart.min = 0;
  sliderStart.max = 100;
  sliderStart.value = 0;
  
  sliderEnd.min = 0;
  sliderEnd.max = 100;
  sliderEnd.value = 100;

  function updateSlider() {
    const minVal = parseInt(sliderStart.value);
    const maxVal = parseInt(sliderEnd.value);

    if (minVal >= maxVal) {
      sliderStart.value = maxVal - 1;
    }

    const percent1 = minVal;
    const percent2 = maxVal;
    trackActive.style.left = `${percent1}%`;
    trackActive.style.width = `${percent2 - percent1}%`;

    const range = dateMax - dateMin;
    startDate = dateMin + (range * minVal / 100);
    endDate = dateMin + (range * maxVal / 100);

    document.getElementById('startDateLabel').textContent = new Date(startDate).toLocaleDateString('en-GB');
    document.getElementById('endDateLabel').textContent = new Date(endDate).toLocaleDateString('en-GB');

    updateTable();
  }

  sliderStart.addEventListener('input', updateSlider);
  sliderEnd.addEventListener('input', updateSlider);

  updateSlider();
}

function updateSliderInfo() {
  const filteredData = filterByDate(allData, new Date(startDate), new Date(endDate));
  
  // Находим максимальное количество задач среди моделей
  let maxTasks = 0;
  if (originalData.length > 0) {
    maxTasks = Math.max(...originalData.map(row => row.n_task));
  }
  
  const fromDate = new Date(startDate).toLocaleDateString('en-GB');
  const toDate = new Date(endDate).toLocaleDateString('en-GB');
  
  // Используем шаблон из переводов
  const template = t('sliderInfo') || 'There are {n} tasks in time window: {from} to {to}';
  const text = template
    .replace('{n}', maxTasks)
    .replace('{from}', fromDate)
    .replace('{to}', toDate);
  
  document.getElementById('sliderInfo').textContent = text;
}

// ============================================================
// TABLE RENDERING
// ============================================================
function updateTable() {
  let filteredData = filterByDate(allData, new Date(startDate), new Date(endDate));
  
  // Применяем фильтры чекбоксов
  const hideDel = document.getElementById('checkHideDel')?.checked;
  const intersectOnly = document.getElementById('checkIntersect')?.checked;
  
  // Фильтр 1: скрыть del-* модели
  if (hideDel) {
    filteredData = filteredData.filter(row => !row.model.startsWith('del-'));
  }
  
  // Фильтр 2: показать только пересекающиеся instance_id
  if (intersectOnly) {
    // Находим instance_id которые есть у всех моделей
    const modelGroups = {};
    filteredData.forEach(row => {
      if (!modelGroups[row.model]) modelGroups[row.model] = new Set();
      modelGroups[row.model].add(row.task_id);
    });
    
    const allModels = Object.keys(modelGroups);
    if (allModels.length > 1) {
      // Находим пересечение
      let commonTaskIds = new Set(modelGroups[allModels[0]]);
      for (let i = 1; i < allModels.length; i++) {
        commonTaskIds = new Set([...commonTaskIds].filter(id => modelGroups[allModels[i]].has(id)));
      }
      
      // Фильтруем данные только по общим task_id
      filteredData = filteredData.filter(row => commonTaskIds.has(row.task_id));
    }
  }
  
  const calculatedData = summarize(filteredData);
  originalData = [...calculatedData];

  if (currentSortKey && sortDirection) {
    sortBy(currentSortKey, true);
  } else {
    renderTable(originalData);
  }

  updateSliderInfo();
}

function renderTable(data = originalData) {
  const tableHead = document.getElementById('tableHead');
  const tableBody = document.getElementById('tableBody');
  const noData = document.getElementById('noData');

  if (!data || data.length === 0) {
    tableHead.innerHTML = '';
    tableBody.innerHTML = '';
    noData.classList.remove('hidden');
    return;
  }

  noData.classList.add('hidden');

  // Определяем max задач
  const maxTasks = Math.max(...data.map(r => r.n_task));
  const hasSubsetModels = data.some(r => r.n_task < maxTasks);

  // Render header
  tableHead.innerHTML = `
    <tr>
      <th>${t('position')}</th>
      <th>${t('model')}</th>
      <th onclick="sortBy('pass@1')">pass@1 <span class="sort-icon ${currentSortKey === 'pass@1' ? 'active' : ''}">↕</span></th>
      <th onclick="sortBy('pass1_std')">pass1_std <span class="sort-icon ${currentSortKey === 'pass1_std' ? 'active' : ''}">↕</span></th>
      <th onclick="sortBy('pass@6')">pass@6 <span class="sort-icon ${currentSortKey === 'pass@6' ? 'active' : ''}">↕</span></th>
      <th onclick="sortBy('n_task')">${t('tasks')} <span class="sort-icon ${currentSortKey === 'n_task' ? 'active' : ''}">↕</span></th>
      <th>${t('trajectory')}</th>
    </tr>
  `;

  // Render body with tooltips and footnotes
  tableBody.innerHTML = data.map(row => {
    const hasSubset = row.n_task < maxTasks;
    const modelDisplay = row.model + (hasSubset ? '*' : '');
    return `
    <tr>
      <td style="text-align: center;">
        <span class="${getClassByRank(row.modelIdx)}">${row.modelIdx}</span>
      </td>
      <td class="model-name" onmouseenter="showTooltip(event, '${row.model}')" onmouseleave="hideTooltip()">${modelDisplay}</td>
      <td>${row["pass@1"].toFixed(2)}%</td>
      <td>${row["pass1_std"].toFixed(2)}</td>
      <td>${row["pass@6"].toFixed(2)}%</td>
      <td>${row.n_task}</td>
      <td><a href="${row.trajectory}" target="_blank" style="color: #8b5cf6; text-decoration: underline;">link</a></td>
    </tr>
  `;
  }).join('');

  // Add footnote if needed
  const container = document.querySelector('.table-container');
  let existingFootnote = container.querySelector('.table-footnote');
  if (existingFootnote) existingFootnote.remove();
  
  if (hasSubsetModels) {
    const footnote = document.createElement('div');
    footnote.className = 'table-footnote';
    footnote.textContent = t('footnoteSubset');
    container.appendChild(footnote);
  }
}

function getClassByRank(idx) {
  switch (idx) {
    case 1: return "rank-badge rank-1";
    case 2: return "rank-badge rank-2";
    case 3: return "rank-badge rank-3";
    default: return "rank-badge rank-other";
  }
}

function sortBy(key, preserveDirection = false) {
  if (!preserveDirection) {
    if (currentSortKey === key) {
      if (sortDirection === "asc") {
        sortDirection = "desc";
      } else if (sortDirection === "desc") {
        sortDirection = null;
        currentSortKey = null;
        renderTable(originalData);
        return;
      } else {
        sortDirection = "asc";
      }
    } else {
      currentSortKey = key;
      sortDirection = "asc";
    }
  }

  const sortedData = [...originalData].sort((a, b) => {
    const aVal = a[key];
    const bVal = b[key];
    if (aVal < bVal) return sortDirection === "asc" ? -1 : 1;
    if (aVal > bVal) return sortDirection === "asc" ? 1 : -1;
    return 0;
  });

  renderTable(sortedData);
}

// ============================================================
// MOBILE MENU
// ============================================================
function toggleMobileMenu() {
  const hamburger = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  hamburger.classList.toggle('active');
  menu.classList.toggle('active');
}

function closeMobileMenu() {
  const hamburger = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  hamburger.classList.remove('active');
  menu.classList.remove('active');
}

// ============================================================
// TOOLTIP
// ============================================================
let tooltipEl = null;

function showTooltip(event, modelName) {
  if (!tooltipEl) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'model-tooltip';
    document.body.appendChild(tooltipEl);
  }
  
  // Получаем метаданные модели
  const metadata = modelMetadata[modelName] || {};
  const skfold = metadata.skfold || 'unknown';
  const model = metadata.model || modelName;
  
  // Формируем tooltip со всеми параметрами (старые + новые)
  tooltipEl.innerHTML = `
    <div>temperature: 0.2</div>
    <div>top_k: 0.95</div>
    <div>pass_at_n: 6</div>
    <div><strong>skfold:</strong> ${skfold}</div>
    <div><strong>model:</strong> ${model}</div>
  `;
  
  tooltipEl.style.opacity = '1';
  tooltipEl.style.left = (event.clientX + 10) + 'px';
  tooltipEl.style.top = (event.clientY + 10) + 'px';
}

function hideTooltip() {
  if (tooltipEl) {
    tooltipEl.style.opacity = '0';
  }
}

// ============================================================
// INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadContent();  // Load translations first
  await loadAllData();  // Then load data
  route();
});
